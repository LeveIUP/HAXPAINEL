<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LEVEL UP</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
--main:#8b5cf6;
--bg:#070b14;
--card:#111827;
--text:#ffffff;
--muted:#9ca3af;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:var(--bg);
color:var(--text);
overflow-x:hidden;
}

/* BACKGROUND */

.bg{
position:fixed;
inset:0;
z-index:-1;

background:
radial-gradient(circle at top left,rgba(139,92,246,.20),transparent 30%),
radial-gradient(circle at bottom right,rgba(0,191,255,.12),transparent 30%),
linear-gradient(-45deg,#070b14,#0d1320,#111827);

background-size:300% 300%;

animation:bg 12s ease infinite;
}

@keyframes bg{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

/* HEADER */

header{
padding:60px 20px 30px;
text-align:center;
}

.logo{
font-size:72px;
font-weight:800;
letter-spacing:3px;
}

.main{
color:white;
}

.highlight{
color:var(--main);
text-shadow:0 0 20px var(--main);
}

.hero{
margin-top:16px;
font-size:34px;
font-weight:700;
}

.sub{
margin-top:10px;
color:var(--muted);
font-size:15px;
}

/* STATS */

.stats{
margin-top:26px;

display:flex;
justify-content:center;
gap:14px;
flex-wrap:wrap;
}

.stat{
padding:14px 18px;

background:
rgba(255,255,255,.04);

border:
1px solid rgba(255,255,255,.06);

border-radius:18px;

font-size:13px;

backdrop-filter:blur(10px);
}

/* CONTAINER */

.container{
max-width:1200px;
margin:auto;
padding:20px;
padding-bottom:80px;
}

/* ALERT */

.alert{
padding:16px;

border-radius:20px;

margin-bottom:24px;

background:
rgba(139,92,246,.12);

border:
1px solid rgba(139,92,246,.25);

color:#d8b4fe;

text-align:center;
font-weight:600;
}

/* LEAD BOX */

.lead-box{

margin-bottom:30px;

padding:24px;

border-radius:28px;

background:
rgba(255,255,255,.05);

border:
1px solid rgba(255,255,255,.08);

backdrop-filter:blur(18px);

box-shadow:
0 0 30px rgba(139,92,246,.12);

}

.lead-title{

font-size:20px;
font-weight:700;

margin-bottom:14px;

}

.lead-sub{
color:var(--muted);
font-size:14px;
margin-bottom:18px;
line-height:1.6;
}

.lead-box input{

width:100%;

padding:18px;

border:none;
outline:none;

border-radius:18px;

background:
rgba(255,255,255,.06);

border:
1px solid rgba(255,255,255,.08);

color:white;

font-size:16px;

}

/* CATEGORIES */

.categories{
display:flex;
gap:12px;
overflow:auto;
padding-bottom:8px;
margin-bottom:28px;
}

.categories::-webkit-scrollbar{
display:none;
}

.category-btn{
min-width:max-content;

padding:14px 20px;

border-radius:18px;

background:
rgba(255,255,255,.04);

border:
1px solid rgba(255,255,255,.06);

cursor:pointer;

transition:.25s;

font-size:14px;
font-weight:600;

display:flex;
align-items:center;
gap:8px;
}

.category-btn:hover{
transform:translateY(-3px);
}

.category-btn.active{
background:var(--main);
border-color:var(--main);

box-shadow:
0 0 25px rgba(139,92,246,.35);
}

/* CARDS */

.cards{
display:grid;

grid-template-columns:
repeat(auto-fit,minmax(280px,1fr));

gap:22px;
}

.card{
position:relative;

padding:24px;

border-radius:28px;

background:
linear-gradient(
180deg,
rgba(255,255,255,.06),
rgba(255,255,255,.03)
);

border:
1px solid rgba(255,255,255,.08);

backdrop-filter:blur(14px);

overflow:hidden;

transition:
transform .25s,
box-shadow .25s,
border .25s;

cursor:pointer;
}

.card:hover{

transform:
translateY(-6px);

border-color:
rgba(139,92,246,.30);

}

.card.active{

border-color:var(--main);

transform:
translateY(-8px)
scale(1.03);

box-shadow:
0 0 45px rgba(139,92,246,.40),
0 0 80px rgba(139,92,246,.15);

background:
linear-gradient(
180deg,
rgba(139,92,246,.16),
rgba(255,255,255,.05)
);

}

.badge{
display:inline-flex;

padding:7px 12px;

border-radius:14px;

background:
rgba(139,92,246,.18);

color:#d8b4fe;

font-size:12px;
font-weight:700;
}

.plan-name{
margin-top:16px;

font-size:28px;
font-weight:800;
}

.price{
margin-top:14px;

font-size:40px;
font-weight:800;

color:var(--main);

text-shadow:
0 0 15px rgba(139,92,246,.35);
}

.info{
margin-top:18px;

display:flex;
flex-direction:column;
gap:10px;
}

.info-item{
display:flex;
justify-content:space-between;

padding:12px;

border-radius:14px;

background:
rgba(255,255,255,.04);

font-size:13px;
}

.desc{
margin-top:18px;

color:var(--muted);

line-height:1.7;
font-size:14px;
}

/* BUY AREA */

.buy-area{

max-height:0;
opacity:0;

overflow:hidden;

transition:.35s;

}

.card.active .buy-area{

max-height:200px;
opacity:1;

margin-top:22px;

}

.buy-btn{

width:100%;

padding:16px;

border:none;

border-radius:18px;

background:
linear-gradient(
45deg,
var(--main),
#00bfff
);

color:white;

font-size:15px;
font-weight:700;

cursor:pointer;

transition:.25s;

}

.buy-btn:hover{

transform:scale(1.02);

}

/* MOBILE */

@media(max-width:700px){

.logo{
font-size:54px;
}

.hero{
font-size:26px;
}

.price{
font-size:34px;
}

.cards{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<div class="bg"></div>

<header>

<div class="logo">
<span class="main" id="brand1"></span>
<span class="highlight" id="brand2"></span>
</div>

<div class="hero" id="hero"></div>

<div class="sub" id="subtitle"></div>

<div class="stats">

<div class="stat">
🔥 <span id="sales"></span> pedidos hoje
</div>

<div class="stat">
🟢 <span id="online"></span> online agora
</div>

</div>

</header>

<div class="container">

<div class="alert" id="promo"></div>

<!-- INSTAGRAM -->

<div class="lead-box">

<div class="lead-title">
📸 Informe seu Instagram
</div>

<div class="lead-sub">
Digite seu perfil e escolha o pacote ideal para impulsionar sua conta.
</div>

<input
type="text"
id="instagram"
placeholder="@seuinstagram"
>

</div>

<!-- CATEGORIES -->

<div class="categories" id="categories"></div>

<!-- CARDS -->

<div class="cards" id="plans"></div>

</div>

<script>

let CONFIG = {};

let selectedCategory = 0;
let selectedPlan = null;

/* FETCH */

fetch('/LEVELUP/config.json')

.then(response => response.json())

.then(data => {

CONFIG = data;

/* COLOR */

document.documentElement
.style
.setProperty(
'--main',
CONFIG.color
);

/* BRAND */

document.getElementById(
'brand1'
).innerHTML =
CONFIG.brand;

document.getElementById(
'brand2'
).innerHTML =
CONFIG.brandHighlight;

/* HERO */

document.getElementById(
'hero'
).innerHTML =
CONFIG.hero;

/* SUBTITLE */

document.getElementById(
'subtitle'
).innerHTML =
CONFIG.subtitle;

/* PROMO */

document.getElementById(
'promo'
).innerHTML =
CONFIG.promo;

/* STATS */

document.getElementById(
'sales'
).innerHTML =
CONFIG.stats.sales;

document.getElementById(
'online'
).innerHTML =
CONFIG.stats.online;

/* RENDER */

renderCategories();

renderPlans(0);

})

.catch(error=>{

console.log(error);

});

/* CATEGORIES */

function renderCategories(){

const container =
document.getElementById(
'categories'
);

container.innerHTML = '';

CONFIG.categories.forEach((cat,index)=>{

container.innerHTML += `

<div
class="category-btn ${index===0 ? 'active':''}"
onclick="changeCategory(${index},this)"
>

<span>${cat.icon}</span>

<span>${cat.name}</span>

</div>

`;

});

}

/* CHANGE CATEGORY */

function changeCategory(index,element){

selectedCategory = index;

document
.querySelectorAll('.category-btn')
.forEach(btn=>{

btn.classList.remove(
'active'
);

});

element.classList.add(
'active'
);

renderPlans(index);

}

/* RENDER PLANS */

function renderPlans(categoryIndex){

const plansContainer =
document.getElementById(
'plans'
);

plansContainer.innerHTML = '';

const category =
CONFIG.categories[categoryIndex];

category.plans.forEach((plan,index)=>{

plansContainer.innerHTML += `

<div
class="card"
onclick="selectPlan(this,${index})"
>

<div class="badge">
${plan.badge}
</div>

<div class="plan-name">
${plan.name}
</div>

<div class="price">
${plan.price}
</div>

<div class="info">

<div class="info-item">
<span>📦 Quantidade</span>
<strong>${plan.followers}</strong>
</div>

<div class="info-item">
<span>⚡ Entrega</span>
<strong>${plan.delivery}</strong>
</div>

<div class="info-item">
<span>💎 Benefício</span>
<strong>${plan.quality}</strong>
</div>

<div class="info-item">
<span>🔥 Garantia</span>
<strong>${plan.refill}</strong>
</div>

</div>

<div class="desc">
${plan.description}
</div>

<div class="buy-area">

<button
class="buy-btn"
onclick="buyPlan(event,${index})"
>

🚀 Comprar Agora

</button>

</div>

</div>

`;

});

}

/* SELECT PLAN */

function selectPlan(card,index){

document
.querySelectorAll('.card')
.forEach(c=>{

c.classList.remove(
'active'
);

});

card.classList.add(
'active'
);

selectedPlan =
CONFIG
.categories[selectedCategory]
.plans[index];

}

/* BUY PLAN */

function buyPlan(event,index){

event.stopPropagation();

let insta =
document
.getElementById(
'instagram'
)
.value
.trim();

if(insta === ''){

alert(
'Digite seu Instagram primeiro'
);

return;

}

if(!insta.startsWith('@')){

insta='@'+insta;

}

selectedPlan =
CONFIG
.categories[selectedCategory]
.plans[index];

const category =
CONFIG.categories[selectedCategory];

const msg = `

🚀 NOVO PEDIDO

📂 Categoria:
${category.name}

📦 Pacote:
${selectedPlan.name}

💰 Valor:
${selectedPlan.price}

📸 Instagram:
${insta}

⚡ ${selectedPlan.delivery}

💎 ${selectedPlan.quality}

🔥 ${selectedPlan.refill}

`;

window.open(
`https://wa.me/${CONFIG.whatsapp}?text=${encodeURIComponent(msg)}`,
'_blank'
);

}

</script>

</body>
</html>
