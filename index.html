<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYPELAB | ÁREA RESTRITA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@900&display=swap');
        body { background-color: #0d1117; color: white; font-family: 'Space Mono', monospace; overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .scanner { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(0deg, rgba(110, 64, 201, 0.05) 0%, rgba(13, 17, 23, 0) 50%, rgba(110, 64, 201, 0.05) 100%); background-size: 100% 8px; z-index: 10; pointer-events: none; animation: scan 3s linear infinite; }
        @keyframes scan { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }
        .glitch { font-family: 'Inter', sans-serif; font-size: 3rem; font-weight: 900; text-transform: uppercase; color: white; text-shadow: 2px 2px #6e40c9; }
        .warning-box { background: rgba(22, 27, 34, 0.9); border: 1px solid rgba(110, 64, 201, 0.4); border-radius: 20px; position: relative; }
        #redirect-area { display: none; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; }
    </style>
</head>
<body>
    <div class="scanner"></div>

    <div class="container max-w-md mx-auto p-8 relative z-20 text-center">
        <img src="https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJid3R1YXp6amZ6amZ6amZ6amZ6amZ6amZ6amZ6amZ6amZ6amZ6amZ6JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/3o7TKuylOmX8ReL3mU/giphy.gif" 
             style="width:100px; margin: 0 auto 20px; border-radius:50%; border:2px solid #6e40c9; padding:5px;" alt="Security">
        
        <h1 class="glitch">HYPELAB</h1>
        
        <div class="warning-box p-6 mt-6 space-y-4">
            <p class="text-xs text-gray-400">
                Acesso não identificado. Você está sendo monitorado. <br>
                IP: <span id="user-ip" class="text-purple-400">...</span>
            </p>

            <div id="redirect-area">
                <p class="text-[10px] text-green-500 font-bold animate-pulse">
                    IDENTIFICADO! REDIRECIONANDO EM... <span id="timer" class="text-white text-lg">5</span>s
                </p>
                <p class="text-[8px] text-gray-500 italic mt-2">Tentando voltar para o último local seguro...</p>
            </div>

            <div id="funny-msg">
                <p class="text-red-500 text-xs font-bold">"Curiosidade matou o gato... mas o sistema aqui só morde."</p>
            </div>
        </div>
    </div>

    <script>
        // 1. Pega o IP
        fetch('https://api.ipify.org?format=json')
            .then(res => res.json()).then(data => document.getElementById('user-ip').innerText = data.ip);

        // 2. Lógica de Redirecionamento
        const lastVisited = localStorage.getItem('last_visited_hypelab');
        const timerElement = document.getElementById('timer');
        const redirectArea = document.getElementById('redirect-area');
        const funnyMsg = document.getElementById('funny-msg');

        if (lastVisited && !window.location.pathname.includes(lastVisited)) {
            // Se ele já visitou algo antes, mostra a contagem
            redirectArea.style.display = 'block';
            funnyMsg.style.display = 'none';
            
            let timeLeft = 5;
            const countdown = setInterval(() => {
                timeLeft--;
                timerElement.innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    window.location.href = lastVisited; // Redireciona!
                }
            }, 1000);
        }

        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
