<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>SUPORTE — HYPELAB CORE</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --primary: #22c55e;
            --bg: #030303;
            --glass: rgba(12, 12, 12, 0.75);
            --border: rgba(255, 255, 255, 0.06);
            --neon-glow: 0 0 20px rgba(34, 197, 94, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
            height: 100vh;
            background-image: 
                radial-gradient(circle at 50% -10%, rgba(34,197,94,0.15) 0%, transparent 45%),
                radial-gradient(circle at 50% 50%, #0a0a0a 0%, #030303 100%);
        }

        /* HEADER / PERFIL IA */
        .bot-profile {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 40px;
            margin-bottom: 20px;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

        .avatar-wrapper {
            position: relative;
            width: 90px;
            height: 90px;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 30px;
            object-fit: cover;
            border: 1px solid rgba(34, 197, 94, 0.4);
            box-shadow: var(--neon-glow);
            background: #000;
        }

        .status-badge {
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 10, 10, 0.9);
            border: 1px solid var(--border);
            padding: 5px 16px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
            backdrop-filter: blur(10px);
        }

        .status-dot { width: 6px; height: 6px; background: var(--primary); border-radius: 50%; animation: pulse 2s infinite; box-shadow: 0 0 8px var(--primary); }
        .status-text { font-size: 9px; font-family: 'JetBrains Mono', monospace; font-weight: 700; color: var(--primary); letter-spacing: 2px; text-transform: uppercase; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .container {
            max-width: 460px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 0 20px 25px;
        }

        /* CHAT WINDOW */
        #chat-container {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 40px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            backdrop-filter: blur(35px);
            box-shadow: 0 30px 70px rgba(0,0,0,0.7);
        }

        #chat-window {
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            flex-grow: 1;
            scrollbar-width: none;
        }
        #chat-window::-webkit-scrollbar { width: 0; }

        .message-row { display: flex; gap: 12px; align-items: flex-end; animation: fadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .message-row.user-row { justify-content: flex-end; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .mini-avatar { width: 30px; height: 30px; border-radius: 10px; border: 1px solid rgba(34,197,94,0.3); object-fit: cover; }

        .msg {
            max-width: 80%;
            padding: 14px 18px;
            border-radius: 22px;
            font-size: 13.5px;
            line-height: 1.6;
            position: relative;
        }

        .msg.bot { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-bottom-left-radius: 4px; color: #e0e0e0; }
        .msg.user { background: var(--primary); color: #000; font-weight: 700; border-bottom-right-radius: 4px; box-shadow: 0 8px 20px rgba(34,197,94,0.15); }

        .time-stamp { display: block; font-size: 8px; opacity: 0.4; margin-top: 6px; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.5px; }

        /* DIGITANDO IA */
        .typing { display: flex; gap: 5px; padding: 12px 18px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 20px; border-bottom-left-radius: 4px; }
        .dot-anim { width: 5px; height: 5px; background: var(--primary); border-radius: 50%; animation: bounce 1.4s infinite; }
        .dot-anim:nth-child(2) { animation-delay: 0.2s; }
        .dot-anim:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }

        /* OPÇÕES */
        #options-area {
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            border-top: 1px solid var(--border);
            background: rgba(0,0,0,0.4);
        }

        .opt-btn {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            color: #fff;
            padding: 14px;
            border-radius: 16px;
            font-size: 11px;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 8px;
        }

        .opt-btn:hover { 
            background: var(--primary); 
            color: #000; 
            border-color: var(--primary);
            box-shadow: 0 5px 15px rgba(34, 197, 94, 0.25);
            transform: translateY(-2px);
        }

        .btn-wa { background: #25D366 !important; border: none !important; color: white !important; grid-column: span 2; }
        .btn-wa:hover { box-shadow: 0 5px 15px rgba(37, 211, 102, 0.3) !important; }
        .full-width { grid-column: span 2; }

        .reset-btn { 
            text-align: center; margin-top: 18px; text-decoration: none; 
            color: #444; font-size: 9px; font-weight: 800; letter-spacing: 2px;
            font-family: 'JetBrains Mono', monospace;
            transition: 0.3s;
        }
        .reset-btn:hover { color: var(--primary); }
    </style>
</head>
<body>

    <main class="container">
        <div class="bot-profile">
            <div class="avatar-wrapper">
                <img src="https://cdn.jsdelivr.net/gh/HYPELABdev/Vitrinni/img/img_1778860662726.jpg" class="avatar-img">
                <div class="status-badge">
                    <div class="status-dot"></div>
                    <span class="status-text">ATENDENTE VIRTUAL</span>
                </div>
            </div>
        </div>

        <div id="chat-container">
            <div id="chat-window">
                </div>
            
            <div id="typing-box" style="display: none;" class="message-row">
                <img src="https://cdn.jsdelivr.net/gh/HYPELABdev/Vitrinni/img/img_1778860662726.jpg" class="mini-avatar">
                <div class="typing">
                    <div class="dot-anim"></div><div class="dot-anim"></div><div class="dot-anim"></div>
                </div>
            </div>

            <div id="options-area"></div>
        </div>
        <a href="javascript:location.reload()" class="reset-btn">[ REINICIAR CONVERSA ]</a>
    </main>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const optionsArea = document.getElementById('options-area');
        const typingBox = document.getElementById('typing-box');
        const botImg = "https://cdn.jsdelivr.net/gh/HYPELABdev/Vitrinni/img/img_1778860662726.jpg";

        // RESPOSTAS TOTALMENTE HUMANIZADAS (Estilo Atendente de Suporte Premium)
        const fluxos = {
            inicio: [
                { texto: "Pagamentos 💸", proximo: "pagamento", icone: "credit-card" },
                { texto: "Prazos de Entrega ⏳", proximo: "prazos", icone: "clock" },
                { texto: "Dúvidas Gerais ❓", proximo: "faq", icone: "help-circle" },
                { texto: "Falar com Humano 👤", proximo: "whatsapp", icone: "user" }
            ],
            pagamento: {
                msg: "Perfeito! Sobre pagamentos, nós trabalhamos com PIX para que o seu acesso seja liberado o mais rápido possível.\n\nComo o nosso processo de validação é focado em segurança, você faz a transferência, envia o comprovante lá no nosso WhatsApp de suporte e a nossa equipe faz a liberação da sua estrutura na hora! Super simples. 👍",
                opcoes: [
                    { texto: "Enviar Comprovante no WhatsApp", link: "https://wa.me/5511949946730?text=Olá, acabei de fazer o Pix e quero ativar meu acesso.", icone: "external-link", class: "full-width" },
                    { texto: "Voltar para o Menu", proximo: "inicio", icone: "arrow-left", class: "full-width" }
                ]
            },
            prazos: {
                msg: "Entendido! Nossos prazos de entrega são bem objetivos para você começar a rodar logo:\n\n• **Vitrinni:** Até 24 horas úteis para a configuração completa.\n• **Painel Operador:** Liberação quase imediata, no máximo 1 hora após confirmarmos o pagamento.\n• **Projetos Customizados:** Alinhamos o prazo direto no seu orçamento.\n\nPode ter certeza de que nossa equipe corre para entregar antes do prazo! ⚡",
                opcoes: [{ texto: "Obrigado, entendi!", proximo: "inicio", icone: "check", class: "full-width" }]
            },
            faq: {
                msg: "Com certeza, me diz uma coisa: qual dessas informações você gostaria de entender melhor agora?",
                opcoes: [
                    { texto: "É seguro mesmo? 🔒", proximo: "seguranca", icone: "shield" },
                    { texto: "Como funciona a garantia? ✅", proximo: "garantia", icone: "award" },
                    { texto: "Onde vou receber? 📩", proximo: "entrega", icone: "mail" },
                    { texto: "Voltar ao Início", proximo: "inicio", icone: "arrow-left" }
                ]
            },
            seguranca: {
                msg: "Olha, essa é a nossa maior prioridade. Toda a nossa infraestrutura conta com criptografia de ponta a ponta e os servidores possuem defesas rigorosas.\n\nNenhum sistema é entregue sem passar por uma bateria de testes. Seus dados e sua operação estão em um ambiente 100% blindado e seguro, pode confiar. 🔒",
                opcoes: [{ texto: "Ver outras dúvidas", proximo: "faq", icone: "help-circle" }, { texto: "Menu Principal", proximo: "inicio", icone: "home" }]
            },
            garantia: {
                msg: "Nós garantimos o funcionamento pleno de tudo o que entregamos! Se qualquer sistema contratado apresentar alguma falha ou bug de fábrica, nosso time técnico entra em ação com prioridade total para corrigir sem qualquer custo adicional para você. Estamos juntos nessa! 🤝",
                opcoes: [{ texto: "Voltar para as dúvidas", proximo: "faq", icone: "help-circle", class: "full-width" }]
            },
            entrega: {
                msg: "A entrega é extremamente prática e 100% digital! Assim que seu pedido é validado, enviamos todos os links de acesso, suas credenciais exclusivas e os manuais explicativos direto no e-mail e no WhatsApp que você cadastrou no momento da compra. Fica tudo salvo com você! 📩",
                opcoes: [{ texto: "Entendi, ver outras dúvidas", proximo: "faq", icone: "help-circle", class: "full-width" }]
            },
            whatsapp: {
                msg: "Perfeito, vou te direcionar para um de nossos especialistas agora mesmo. É só clicar no botão abaixo para abrir a conversa privada no WhatsApp. Já estamos te esperando por lá! 💬",
                opcoes: [{ texto: "Chamar Suporte no WhatsApp", link: "https://wa.me/5511949946730", class: "btn-wa", icone: "message-circle" }, { texto: "Ficar no Chat", proximo: "inicio", icone: "arrow-left", class: "full-width" }]
            }
        };

        function getTime() {
            const now = new Date();
            return now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
        }

        function addBotMessage(text) {
            typingBox.style.display = 'flex';
            chatWindow.scrollTop = chatWindow.scrollHeight;

            setTimeout(() => {
                typingBox.style.display = 'none';
                const row = document.createElement('div');
                row.className = 'message-row';
                row.innerHTML = `
                    <img src="${botImg}" class="mini-avatar">
                    <div class="msg bot">
                        ${text.replace(/\n/g, '<br>')}
                        <span class="time-stamp">${getTime()} // ATENDENTE</span>
                    </div>`;
                chatWindow.appendChild(row);
                chatWindow.scrollTop = chatWindow.scrollHeight;
            }, 600);
        }

        function addUserMessage(text) {
            const row = document.createElement('div');
            row.className = 'message-row user-row';
            row.innerHTML = `<div class="msg user">${text}<span class="time-stamp" style="color:rgba(0,0,0,0.4)">${getTime()} // VOCÊ</span></div>`;
            chatWindow.appendChild(row);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function renderOptions(key) {
            optionsArea.innerHTML = '';
            optionsArea.style.opacity = '0.3';
            optionsArea.style.pointerEvents = 'none';

            const data = key === 'inicio' ? fluxos.inicio : (fluxos[key].opcoes || []);
            
            setTimeout(() => {
                optionsArea.style.opacity = '1';
                optionsArea.style.pointerEvents = 'all';
                data.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = `opt-btn ${opt.class || ''}`;
                    
                    const iconHtml = opt.icone ? `<i data-lucide="${opt.icone}" width="14" height="14"></i>` : '';
                    btn.innerHTML = `${iconHtml} ${opt.texto}`;
                    
                    btn.onclick = () => {
                        if(opt.link) { window.open(opt.link, '_blank'); return; }
                        addUserMessage(opt.texto);
                        addBotMessage(fluxos[opt.proximo].msg);
                        renderOptions(opt.proximo);
                    };
                    optionsArea.appendChild(btn);
                });
                lucide.createIcons();
            }, 700);
        }

        window.onload = () => {
            addBotMessage("Olá! Seja muito bem-vindo ao suporte da HYPELAB. 😊\n\nMeu nome é H-Bot e estou aqui para te ajudar. Por favor, selecione uma das opções abaixo para iniciarmos seu atendimento:");
            renderOptions('inicio');
        };
    </script>
</body>
</html>
