<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>SUPORTE — HYPELAB CORE</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #22c55e;
            --bg: #030303;
            --glass: rgba(18, 18, 18, 0.85);
            --border: rgba(255, 255, 255, 0.08);
            --neon-glow: 0 0 15px rgba(34, 197, 94, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
            height: 100vh;
            background-image: radial-gradient(circle at 50% 50%, #0a0a0a 0%, #030303 100%);
        }

        /* HEADER / PERFIL */
        .bot-profile {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 60px;
            margin-bottom: 15px;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .avatar-wrapper {
            position: relative;
            width: 85px;
            height: 85px;
            margin-bottom: 10px;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 28px;
            object-fit: cover;
            border: 2px solid var(--primary);
            box-shadow: var(--neon-glow);
            background: #000;
        }

        .status-badge {
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            background: #000;
            border: 1px solid var(--border);
            padding: 3px 12px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .status-dot { width: 6px; height: 6px; background: var(--primary); border-radius: 50%; animation: pulse 1.5s infinite; }
        .status-text { font-size: 8px; font-weight: 900; color: var(--primary); letter-spacing: 1.5px; text-transform: uppercase; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .container {
            max-width: 450px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 0 15px 20px;
        }

        /* JANELA DE CHAT */
        #chat-container {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 35px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            backdrop-filter: blur(25px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        #chat-window {
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex-grow: 1;
            scrollbar-width: none;
        }

        .message-row { display: flex; gap: 10px; align-items: flex-end; animation: fadeIn 0.3s ease; margin-bottom: 5px; }
        .message-row.user-row { justify-content: flex-end; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .mini-avatar { width: 28px; height: 28px; border-radius: 8px; border: 1px solid var(--primary); object-fit: cover; }

        .msg {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 13px;
            line-height: 1.5;
            position: relative;
        }

        .msg.bot { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-bottom-left-radius: 4px; color: #dfdfdf; }
        .msg.user { background: var(--primary); color: #000; font-weight: 700; border-bottom-right-radius: 4px; box-shadow: 0 4px 15px rgba(34,197,94,0.2); }

        .time-stamp { display: block; font-size: 8px; opacity: 0.5; margin-top: 4px; font-family: 'JetBrains Mono', monospace; }

        /* DIGITANDO */
        .typing { display: flex; gap: 4px; padding: 10px; }
        .dot-anim { width: 4px; height: 4px; background: var(--primary); border-radius: 50%; animation: bounce 1.4s infinite; }
        .dot-anim:nth-child(2) { animation-delay: 0.2s; }
        .dot-anim:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-5px); } }

        /* OPÇÕES */
        #options-area {
            padding: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            border-top: 1px solid var(--border);
            background: rgba(0,0,0,0.2);
        }

        .opt-btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            color: #fff;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 10px;
            text-transform: uppercase;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .opt-btn:hover { 
            background: var(--primary); 
            color: #000; 
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(34, 197, 94, 0.3);
            transform: translateY(-2px);
        }

        .btn-wa { background: #25D366 !important; border: none !important; color: white !important; }

        .reset-btn { 
            text-align: center; margin-top: 15px; text-decoration: none; 
            color: #444; font-size: 9px; font-weight: 800; letter-spacing: 2px;
            transition: 0.3s;
        }
        .reset-btn:hover { color: var(--primary); }
    </style>
</head>
<body>

    <main class="container">
        <div class="bot-profile">
            <div class="avatar-wrapper">
                <img src="https://cdn.jsdelivr.net/gh/HYPELABdev/Vitrinni/img/img_1778860662726.jpg" class="avatar-img">
                <div class="status-badge">
                    <div class="status-dot"></div>
                    <span class="status-text">H-BOT ATIVO</span>
                </div>
            </div>
        </div>

        <div id="chat-container">
            <div id="chat-window">
                <!-- As mensagens aparecerão aqui -->
            </div>
            
            <div id="typing-box" style="display: none;" class="message-row">
                <img src="https://cdn.jsdelivr.net/gh/HYPELABdev/Vitrinni/img/img_1778860662726.jpg" class="mini-avatar">
                <div class="typing">
                    <div class="dot-anim"></div><div class="dot-anim"></div><div class="dot-anim"></div>
                </div>
            </div>

            <div id="options-area"></div>
        </div>
        <a href="javascript:location.reload()" class="reset-btn">REINICIAR PROTOCOLO</a>
    </main>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const optionsArea = document.getElementById('options-area');
        const typingBox = document.getElementById('typing-box');
        const botImg = "https://cdn.jsdelivr.net/gh/HYPELABdev/Vitrinni/img/img_1778860662726.jpg";

        const fluxos = {
            inicio: [
                { texto: "Pagamentos 💸", proximo: "pagamento" },
                { texto: "Prazos de Entrega ⏳", proximo: "prazos" },
                { texto: "Dúvidas Gerais ❓", proximo: "faq" },
                { texto: "Suporte Humano 👤", proximo: "whatsapp" }
            ],
            pagamento: {
                msg: "Aceitamos PIX para liberação prioritária. O processo é manual e seguro: você envia o comprovante via WhatsApp e nossa equipe ativa seu acesso em instantes.",
                opcoes: [
                    { texto: "Pagar via WhatsApp", link: "https://wa.me/5511949946730?text=Olá, quero realizar o pagamento" },
                    { texto: "Voltar", proximo: "inicio" }
                ]
            },
            prazos: {
                msg: "Configuração Vitrinni: 24h úteis.\nPainel Operador: Até 1h após validação.\nProjetos Custom: Prazo definido em orçamento.",
                opcoes: [{ texto: "Entendido", proximo: "inicio" }]
            },
            faq: {
                msg: "Selecione uma dúvida comum do nosso núcleo de dados:",
                opcoes: [
                    { texto: "É seguro? 🔒", proximo: "seguranca" },
                    { texto: "Tem garantia? ✅", proximo: "garantia" },
                    { texto: "Onde recebo? 📩", proximo: "entrega" },
                    { texto: "Voltar", proximo: "inicio" }
                ]
            },
            seguranca: {
                msg: "Totalmente. Utilizamos criptografia de ponta a ponta e todos os nossos sistemas são testados contra vulnerabilidades antes da entrega final.",
                opcoes: [{ texto: "Ver outras dúvidas", proximo: "faq" }, { texto: "Menu Principal", proximo: "inicio" }]
            },
            garantia: {
                msg: "Oferecemos garantia de funcionamento total. Caso o sistema apresente qualquer bug nativo, nossa equipe técnica realiza a correção prioritária.",
                opcoes: [{ texto: "Ver outras dúvidas", proximo: "faq" }]
            },
            entrega: {
                msg: "A entrega é 100% digital. Você receberá os links de acesso, credenciais e manuais diretamente no e-mail e WhatsApp informados na compra.",
                opcoes: [{ texto: "Ver outras dúvidas", proximo: "faq" }]
            },
            whatsapp: {
                msg: "Conectando ao núcleo de atendimento humano. Clique abaixo para ser redirecionado.",
                opcoes: [{ texto: "Abrir WhatsApp", link: "https://wa.me/5511949946730", class: "btn-wa" }, { texto: "Voltar", proximo: "inicio" }]
            }
        };

        function getTime() {
            const now = new Date();
            return now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
        }

        function addBotMessage(text) {
            typingBox.style.display = 'flex';
            chatWindow.scrollTop = chatWindow.scrollHeight;

            setTimeout(() => {
                typingBox.style.display = 'none';
                const row = document.createElement('div');
                row.className = 'message-row';
                row.innerHTML = `
                    <img src="${botImg}" class="mini-avatar">
                    <div class="msg bot">
                        ${text.replace(/\n/g, '<br>')}
                        <span class="time-stamp">${getTime()}</span>
                    </div>`;
                chatWindow.appendChild(row);
                chatWindow.scrollTop = chatWindow.scrollHeight;
            }, 1000);
        }

        function addUserMessage(text) {
            const row = document.createElement('div');
            row.className = 'message-row user-row';
            row.innerHTML = `<div class="msg user">${text}<span class="time-stamp" style="color:rgba(0,0,0,0.4)">${getTime()}</span></div>`;
            chatWindow.appendChild(row);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function renderOptions(key) {
            optionsArea.innerHTML = '';
            optionsArea.style.opacity = '0.3';
            optionsArea.style.pointerEvents = 'none';

            const data = key === 'inicio' ? fluxos.inicio : (fluxos[key].opcoes || []);
            
            setTimeout(() => {
                optionsArea.style.opacity = '1';
                optionsArea.style.pointerEvents = 'all';
                data.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = `opt-btn ${opt.class || ''}`;
                    btn.innerText = opt.texto;
                    btn.onclick = () => {
                        if(opt.link) { window.open(opt.link, '_blank'); return; }
                        addUserMessage(opt.texto);
                        addBotMessage(fluxos[opt.proximo].msg);
                        renderOptions(opt.proximo);
                    };
                    optionsArea.appendChild(btn);
                });
            }, 1100);
        }

        window.onload = () => {
            addBotMessage("Interface de suporte HYPELAB ativa. Selecione um módulo operacional para continuar.");
            renderOptions('inicio');
        };
    </script>
</body>
</html>
