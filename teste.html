Teste<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HYPELAB | Mobile IDE Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;700&display=swap');
        
        * { box-sizing: border-box; }

        body, html { 
            font-family: 'Inter', sans-serif; 
            background-color: #0d1117; 
            margin: 0; 
            height: 100vh;
            width: 100vw;
            overflow: hidden; /* Proíbe o scroll da página inteira */
            position: fixed;
        }

        /* HEADER SEMPRE NO TOPO */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background-color: #161b22;
            border-bottom: 1px solid #30363d;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
        }

        /* CONTAINER QUE OCUPA O RESTO DA TELA */
        #main-wrapper {
            position: absolute;
            top: 60px; /* Começa depois do header */
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .file-bar {
            background-color: #090c10;
            border-bottom: 1px solid #1f242b;
            padding: 5px 15px;
            flex-shrink: 0;
        }

        /* EDITOR COM SCROLL INTERNO APENAS */
        textarea { 
            background: transparent; 
            color: #e6edf3; 
            border: none; 
            width: 100%; 
            height: 100%;
            padding: 20px; 
            font-size: 14px; 
            line-height: 1.5; 
            resize: none; 
            outline: none;
            font-family: 'Fira Code', monospace;
            overflow-y: auto; /* Scroll vertical */
            overflow-x: auto; /* Scroll horizontal se a linha for muito longa */
            white-space: pre; /* Mantém a estrutura sem quebrar linha sozinho */
            -webkit-overflow-scrolling: touch;
        }

        #sidebar { 
            position: fixed; left: 0; top: 0; bottom: 0; 
            width: 80%; max-width: 300px; 
            background-color: #161b22; 
            border-right: 1px solid #30363d; 
            transition: transform 0.3s ease; 
            z-index: 200; 
            transform: translateX(-100%);
        }
        #sidebar.open { transform: translateX(0); box-shadow: 20px 0 50px #000; }

        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 150;
        }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <header>
        <div class="flex items-center gap-2">
            <button onclick="toggleSidebar()" class="w-10 h-10 bg-[#21262d] text-white rounded-lg flex items-center justify-center">
                <i class="fas fa-bars"></i>
            </button>
            <button onclick="createNewRepo()" class="text-orange-500 text-[10px] font-bold border border-orange-900/50 rounded px-2 py-1">
                REPO
            </button>
        </div>
        
        <div class="flex items-center gap-2">
            <button onclick="setNewToken()" class="text-gray-500 p-2"><i class="fas fa-key text-sm"></i></button>
            <button onclick="saveFile()" class="bg-green-600 text-white px-4 py-2 rounded-lg text-xs font-bold shadow-lg">
                PUBLICAR
            </button>
        </div>
    </header>

    <div id="overlay" class="overlay" onclick="toggleSidebar()"></div>

    <div id="main-wrapper">
        <div class="file-bar">
            <span id="file-title" class="text-[9px] font-mono text-gray-500 uppercase tracking-widest truncate block">Nenhum Arquivo Selecionado</span>
        </div>
        
        <textarea id="editor" spellcheck="false" placeholder="// Cole seu código aqui..."></textarea>
        
        <div id="loader" class="hidden absolute inset-0 bg-[#0d1117]/90 flex items-center justify-center z-[210]">
            <div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
        </div>
    </div>

    <aside id="sidebar">
        <div class="p-5 flex flex-col h-full">
            <div class="flex justify-between items-center mb-6">
                <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">LEVELUP FILES</span>
                <button onclick="listFiles()" class="text-blue-500 p-2"><i class="fas fa-sync-alt"></i></button>
            </div>
            
            <button onclick="addNewFile()" class="w-full mb-4 bg-blue-600/10 border border-blue-500/30 text-blue-400 py-3 rounded-lg text-sm font-bold">
                + Novo Arquivo
            </button>

            <div id="file-list" class="space-y-2 overflow-y-auto flex-1">
                </div>
        </div>
    </aside>

    <script>
        // LÓGICA MANTIDA CONFORME VERSÕES ANTERIORES
        let GITHUB_TOKEN = localStorage.getItem('hypelab_token') || "";
        let REPO = localStorage.getItem('hypelab_active_repo') || "HYPELABdev/LEVELUP";
        let currentSha = "";
        let currentPath = "";

        function toggleSidebar() { 
            document.getElementById('sidebar').classList.toggle('open'); 
            document.getElementById('overlay').classList.toggle('active');
        }

        function setNewToken() {
            const t = prompt("Token GitHub:", GITHUB_TOKEN);
            if (t) { GITHUB_TOKEN = t.trim(); localStorage.setItem('hypelab_token', GITHUB_TOKEN); listFiles(); }
        }

        async function listFiles() {
            if (!GITHUB_TOKEN) return;
            const list = document.getElementById('file-list');
            list.innerHTML = "<p class='text-center py-4 text-xs text-blue-500'>Lendo...</p>";
            try {
                const res = await fetch(`https://api.github.com/repos/${REPO}/contents/`, {
                    headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
                });
                const data = await res.json();
                list.innerHTML = "";
                data.forEach(f => {
                    if (f.type === "file") {
                        const div = document.createElement('div');
                        div.className = "flex items-center justify-between p-3 bg-[#1c2128] rounded-lg border border-[#30363d]";
                        div.innerHTML = `
                            <div class="flex items-center gap-3 truncate flex-1" onclick="fetchFile('${f.path}')">
                                <i class="far fa-file-code text-blue-400"></i>
                                <span class="text-xs font-mono truncate text-gray-300">${f.name}</span>
                            </div>
                            <button onclick="deleteFile('${f.path}', '${f.sha}')" class="text-red-500 p-2"><i class="fas fa-trash-alt"></i></button>
                        `;
                        list.appendChild(div);
                    }
                });
            } catch (e) { list.innerHTML = "<p class='text-red-500 text-xs text-center'>Erro.</p>"; }
        }

        async function fetchFile(path) {
            document.getElementById('loader').classList.remove('hidden');
            try {
                const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}?t=${Date.now()}`, {
                    headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
                });
                const data = await res.json();
                currentSha = data.sha;
                currentPath = data.path;
                document.getElementById('file-title').innerText = data.path.toUpperCase();
                document.getElementById('editor').value = decodeURIComponent(escape(atob(data.content)));
                toggleSidebar();
            } catch (e) { alert("Erro ao abrir."); }
            finally { document.getElementById('loader').classList.add('hidden'); }
        }

        function addNewFile() {
            const name = prompt("Nome do arquivo:");
            if (!name) return;
            currentPath = name;
            currentSha = "";
            document.getElementById('editor').value = "";
            document.getElementById('file-title').innerText = "NOVO: " + name.toUpperCase();
            toggleSidebar();
        }

        async function saveFile() {
            if (!currentPath) return alert("Selecione um arquivo.");
            document.getElementById('loader').classList.remove('hidden');
            try {
                const content = document.getElementById('editor').value;
                const body = { message: "Cloud Edit", content: btoa(unescape(encodeURIComponent(content))) };
                if (currentSha) body.sha = currentSha;

                const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${currentPath}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                if (res.ok) {
                    const data = await res.json();
                    currentSha = data.content.sha;
                    alert("✅ Publicado!");
                    listFiles();
                } else { alert("Erro ao salvar."); }
            } catch (e) { alert("Erro de conexão."); }
            finally { document.getElementById('loader').classList.add('hidden'); }
        }

        async function deleteFile(path, sha) {
            if (!confirm(`Apagar ${path}?`)) return;
            try {
                await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: "Delete", sha: sha })
                });
                listFiles();
            } catch (e) { alert("Erro."); }
        }

        async function createNewRepo() {
            const name = prompt("Nome do Novo Repositório:");
            if (!name) return;
            document.getElementById('loader').classList.remove('hidden');
            try {
                const res = await fetch(`https://api.github.com/user/repos`, {
                    method: 'POST',
                    headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: name, auto_init: true })
                });
                if (res.ok) {
                    const data = await res.json();
                    REPO = data.full_name;
                    localStorage.setItem('hypelab_active_repo', REPO);
                    alert("✅ Repo Criado!");
                    listFiles();
                }
            } catch (e) { alert("Erro."); }
            finally { document.getElementById('loader').classList.add('hidden'); }
        }

        window.onload = () => { if (GITHUB_TOKEN) listFiles(); else setNewToken(); };
    </script>
</body>
</html>
